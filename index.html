<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🍳 오므라이스 만들기</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   CSS 변수 — 전체 색상 시스템
   따뜻한 주방 테마: 계란 노랑 + 케챱 빨강 + 크림 화이트
═══════════════════════════════════════════════ */
:root{
  --yolk:#f5c842;
  --yolk2:#e8a820;
  --egg:#fff8e1;
  --ketchup:#e8281e;
  --ketchup2:#c01810;
  --rice:#fff3c0;
  --pan:#3a3a3a;
  --cream:#fdf8f0;
  --border:#e8d5b0;
  --text:#2a1a00;
  --text2:#8a6a40;
  --green:#2d9c4a;
  --red:#e8281e;
  --shadow:rgba(0,0,0,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nanum Gothic',sans-serif;
  background:linear-gradient(135deg,#fdf3e0 0%,#fff8f0 100%);
  min-height:100vh;overflow-x:hidden;
  color:var(--text);
}

/* ═══ HUD 상단바 ═══ */
#hud{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:linear-gradient(to right,var(--yolk),var(--yolk2));
  display:flex;align-items:center;padding:0 16px;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);z-index:100;
}
#hud-title{font-family:'Jua',sans-serif;font-size:1.1rem;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,0.3);}
#hud-score{font-family:'Jua',sans-serif;font-size:0.9rem;color:#fff;background:rgba(0,0,0,0.15);padding:3px 12px;border-radius:20px;}
#hud-right{margin-left:auto;display:flex;align-items:center;gap:8px;}

/* 치지직 HUD 버튼 */
#hudChzzkBtn{
  display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,0.15);border:1.5px solid rgba(255,255,255,0.4);
  border-radius:20px;padding:4px 12px;cursor:pointer;
  font-family:'Jua',sans-serif;font-size:0.72rem;color:#fff;
  transition:all 0.15s;
}
#hudChzzkBtn:hover{background:rgba(0,0,0,0.25);}
.hud-dot{width:8px;height:8px;border-radius:50%;background:#ff6b6b;}
.hud-dot.live{background:#4ade80;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}
#chzzkLiveBadge{display:none;align-items:center;gap:6px;background:rgba(0,0,0,0.15);border-radius:20px;padding:4px 10px;}
#chzzkLiveBadge .live-text{font-family:'Jua',sans-serif;font-size:0.72rem;color:#fff;}
#chzzkLiveDisconnect{background:none;border:1px solid rgba(255,255,255,0.4);border-radius:10px;padding:2px 8px;font-size:0.65rem;color:#fff;cursor:pointer;font-family:'Jua',sans-serif;}

/* ═══ 메인 레이아웃 ═══ */
#gameWrap{
  display:grid;
  grid-template-columns:220px 1fr 240px;
  grid-template-rows:1fr 140px;
  height:calc(100vh - 48px);
  margin-top:48px;
  overflow:hidden;
}

/* ═══ 재료 패널 (왼쪽) ═══ */
#ingredientPanel{
  grid-row:1/3;grid-column:1;
  background:#fef9f0;
  border-right:3px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.ip-header{
  padding:12px 14px 10px;
  background:linear-gradient(to right,#fff3c0,#ffeaa0);
  border-bottom:2px solid var(--border);
}
.ip-title{font-family:'Jua',sans-serif;font-size:0.9rem;color:var(--text);letter-spacing:1px;}
.ip-subtitle{font-size:0.68rem;color:var(--text2);margin-top:3px;}
.ing-grid{
  flex:1;overflow-y:auto;padding:10px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  align-content:start;
}
.ing-btn{
  background:#fff;border:2px solid var(--border);border-radius:12px;
  padding:10px 6px;cursor:pointer;text-align:center;
  transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:5px;
  min-height:70px;justify-content:center;position:relative;
  font-family:'Nanum Gothic',sans-serif;
}
.ing-btn:hover{border-color:var(--yolk);transform:translateY(-2px);box-shadow:0 4px 12px var(--shadow);}
.ing-btn.selected{border-color:var(--yolk2);background:#fff8e1;box-shadow:0 0 0 3px rgba(245,200,66,0.2);}
.ing-btn.selected::after{
  content:'✓';position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;background:var(--yolk2);border-radius:50%;
  font-size:0.65rem;color:#fff;display:flex;align-items:center;justify-content:center;
  line-height:18px;
}
.ing-emoji{font-size:1.8rem;line-height:1;}
.ing-name{font-size:0.68rem;color:var(--text);font-weight:700;}

/* 선택된 재료 영역 */
.selected-area{
  padding:10px 12px;border-top:2px solid var(--border);
  background:#fff8e1;min-height:80px;
}
.sa-title{font-size:0.65rem;color:var(--text2);margin-bottom:6px;font-weight:700;}
.sa-tags{display:flex;flex-wrap:wrap;gap:4px;}
.sa-tag{
  background:var(--yolk);color:#fff;border-radius:10px;
  padding:3px 8px;font-size:0.65rem;font-family:'Jua',sans-serif;
  cursor:pointer;transition:all 0.1s;display:flex;align-items:center;gap:3px;
}
.sa-tag:hover{background:var(--yolk2);}
.sa-empty{font-size:0.68rem;color:var(--text2);}

/* ═══ 중앙 주방 씬 ═══ */
#kitchenScene{
  grid-row:1;grid-column:2;
  position:relative;overflow:hidden;
  background:linear-gradient(to bottom,#fff9f0 0%,#fdf0d8 100%);
}

/* 주방 배경 타일 무늬 */
#kitchenScene::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,rgba(232,213,176,0.15) 0,rgba(232,213,176,0.15) 1px,transparent 1px,transparent 40px),
    repeating-linear-gradient(90deg,rgba(232,213,176,0.15) 0,rgba(232,213,176,0.15) 1px,transparent 1px,transparent 40px);
  pointer-events:none;
}

/* 프라이팬 */
#fryPan{
  position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  width:220px;height:120px;
}
.pan-body{
  position:absolute;bottom:0;left:20px;right:20px;
  height:80px;
  background:radial-gradient(ellipse at 50% 30%,#555 0%,#333 60%,#222 100%);
  border-radius:50%;
  box-shadow:0 8px 20px rgba(0,0,0,0.4),inset 0 -4px 8px rgba(0,0,0,0.3);
}
.pan-handle{
  position:absolute;bottom:25px;right:-60px;
  width:70px;height:18px;
  background:linear-gradient(to right,#444,#333);
  border-radius:0 9px 9px 0;
  box-shadow:0 3px 6px rgba(0,0,0,0.3);
}
.pan-handle::after{
  content:'';position:absolute;top:3px;left:5px;right:10px;bottom:3px;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,0.05) 0,rgba(255,255,255,0.05) 4px,transparent 4px,transparent 8px);
  border-radius:6px;
}
.pan-sheen{
  position:absolute;bottom:20px;left:45px;width:40px;height:18px;
  background:rgba(255,255,255,0.1);border-radius:50%;
  pointer-events:none;
}

/* 프라이팬 위 재료 */
#panIngredients{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;flex-wrap:wrap;justify-content:center;gap:4px;
  width:140px;pointer-events:none;
}
.pan-item{font-size:1.6rem;animation:sizzle 0.5s ease-in-out infinite alternate;}
@keyframes sizzle{0%{transform:rotate(-3deg) scale(1);}100%{transform:rotate(3deg) scale(1.05);}}

/* 증기 */
.steam{
  position:absolute;bottom:120px;left:50%;
  display:flex;gap:8px;pointer-events:none;opacity:0;
  transition:opacity 0.5s;
}
.steam.show{opacity:1;}
.steam-line{
  width:4px;height:0;background:linear-gradient(to top,rgba(200,180,150,0.5),transparent);
  border-radius:2px;animation:steamUp 1.5s ease-in-out infinite;
}
.steam-line:nth-child(2){animation-delay:0.3s;height:0;}
.steam-line:nth-child(3){animation-delay:0.6s;height:0;}
@keyframes steamUp{
  0%{height:0;opacity:0;transform:translateY(0) scaleX(1);}
  50%{height:40px;opacity:0.7;transform:translateY(-10px) scaleX(1.5);}
  100%{height:20px;opacity:0;transform:translateY(-40px) scaleX(2);}
}

/* 메시지 */
#kitchenMsg{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.95);border:2px solid var(--border);
  border-radius:20px;padding:6px 20px;
  font-size:0.8rem;color:var(--text);
  white-space:nowrap;opacity:0;transition:opacity 0.3s;
  font-family:'Nanum Gothic',sans-serif;pointer-events:none;
  box-shadow:0 3px 12px var(--shadow);
}
#kitchenMsg.show{opacity:1;}

/* 레시피 힌트 — 숨김 */
#recipeHint{ display:none; }

/* ═══ 오른쪽 패널 ═══ */
#rightPanel{
  grid-row:1/3;grid-column:3;
  background:#fef9f0;border-left:3px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;padding:10px;gap:8px;
}
.rp-card{background:#fff;border:2px solid var(--border);border-radius:12px;padding:10px;}
.rp-title{font-family:'Jua',sans-serif;font-size:0.8rem;color:var(--text);margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:5px;}

/* 주문 카드 */
.order-card{
  background:linear-gradient(135deg,#fff9ec,#fff3d0);
  border:2px solid var(--yolk);border-radius:10px;
  padding:8px 10px;margin-bottom:6px;
  font-size:0.72rem;
  animation:orderIn 0.3s ease-out;
}
@keyframes orderIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.order-nick{font-family:'Jua',sans-serif;color:var(--ketchup);font-size:0.8rem;}
.order-amount{font-size:0.65rem;color:var(--text2);}
.order-msg{color:var(--text);margin-top:2px;font-size:0.7rem;}
.order-timer{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.order-timer-bar{height:100%;background:var(--yolk);border-radius:2px;transition:width 0.5s linear;}

/* 레시피 목록 */
.recipe-item{
  display:flex;align-items:center;gap:6px;
  padding:5px 6px;border-radius:8px;margin-bottom:4px;
  font-size:0.7rem;background:#fff;border:1px solid var(--border);
  cursor:pointer;transition:all 0.1s;
}
.recipe-item:hover{border-color:var(--yolk);background:#fffbf0;}
.recipe-item.active{border-color:var(--yolk2);background:#fff8e1;}
.recipe-name{font-weight:700;font-family:'Jua',sans-serif;font-size:0.72rem;}
.recipe-ings{color:var(--text2);font-size:0.64rem;}

/* 점수 */
.score-row{display:flex;justify-content:space-between;font-size:0.72rem;padding:3px 0;border-bottom:1px solid var(--border);}
.score-label{color:var(--text2);}
.score-val{font-weight:700;font-family:'Jua',sans-serif;}

/* ═══ 하단 제조 패널 ═══ */
#craftPanel{
  grid-row:2;grid-column:2;
  background:linear-gradient(to right,#fff3c0,#ffeaa0);
  border-top:3px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:0 20px;
}
.craft-btn{
  padding:10px 24px;border:none;border-radius:12px;
  font-family:'Jua',sans-serif;font-size:1rem;
  cursor:pointer;transition:all 0.15s;letter-spacing:1px;
}
.craft-btn--cook{
  background:linear-gradient(to bottom,var(--ketchup),var(--ketchup2));
  color:#fff;box-shadow:0 4px 0 #900;
}
.craft-btn--cook:hover{transform:translateY(-2px);box-shadow:0 6px 0 #900;}
.craft-btn--cook:active{transform:translateY(2px);box-shadow:0 2px 0 #900;}
.craft-btn--clear{
  background:#fff;border:2px solid var(--border);color:var(--text2);
}
.craft-btn--clear:hover{border-color:var(--ketchup);color:var(--ketchup);}

/* 진행 바 */
#cookProgress{
  width:120px;height:10px;background:rgba(0,0,0,0.1);
  border-radius:5px;overflow:hidden;display:none;
}
#cookProgressBar{
  height:100%;width:0%;background:linear-gradient(to right,var(--ketchup),var(--yolk));
  border-radius:5px;transition:width 0.05s linear;
}

/* ═══ 완성 팝업 ═══ */
#resultPopup{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:200;align-items:center;justify-content:center;
  animation:fadeIn 0.3s ease-out;
}
#resultPopup.show{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.result-box{
  background:#fff;border-radius:20px;padding:24px;
  max-width:520px;width:90%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.result-title{font-family:'Jua',sans-serif;font-size:1.6rem;margin-bottom:8px;}
.result-title.success{color:var(--ketchup);}
.result-title.fail{color:#888;}
.result-subtitle{font-size:0.85rem;color:var(--text2);margin-bottom:16px;}

/* 오므라이스 캔버스 */
#omuCanvas{
  border-radius:12px;border:3px solid var(--border);
  cursor:crosshair;display:block;margin:0 auto 12px;
}
.draw-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.color-btn{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all 0.1s;}
.color-btn.active{border-color:var(--text);transform:scale(1.2);}
.size-btn{background:#f0f0f0;border:1px solid #ddd;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:0.7rem;font-family:'Jua',sans-serif;}
.size-btn.active{background:var(--yolk);color:#fff;border-color:var(--yolk2);}

/* ═══ 실패 팝업 ═══ */
#failPopup{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);
  z-index:200;align-items:center;justify-content:center;
}
#failPopup.show{display:flex;}
.fail-box{
  background:#fff;border-radius:20px;padding:40px 50px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.fail-emoji{font-size:4rem;margin-bottom:12px;}
.fail-title{
  font-family:'Jua',sans-serif;font-size:1.8rem;
  color:#888;margin-bottom:10px;
}
.fail-sub{
  font-size:0.9rem;color:#aaa;
  font-family:'Nanum Gothic',sans-serif;
  line-height:1.6;margin-bottom:24px;
}

.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.result-btn{
  padding:10px 20px;border:none;border-radius:10px;
  font-family:'Jua',sans-serif;font-size:0.9rem;cursor:pointer;transition:all 0.15s;
}
.result-btn--download{background:var(--green);color:#fff;}
.result-btn--again{background:var(--yolk);color:#fff;}
.result-btn--close{background:#f0f0f0;color:var(--text);}

/* ═══ 후원 팝업 ═══ */
#donationPopup{
  display:none;position:fixed;top:70px;right:20px;
  background:linear-gradient(135deg,#fff9ec,#fff3d0);
  border:3px solid var(--yolk2);border-radius:16px;
  padding:16px 20px;max-width:300px;
  box-shadow:0 8px 30px rgba(0,0,0,0.2);
  z-index:150;animation:slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.don-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.don-badge{background:var(--ketchup);color:#fff;border-radius:8px;padding:2px 8px;font-family:'Jua',sans-serif;font-size:0.7rem;}
.don-nick{font-family:'Jua',sans-serif;font-size:1rem;color:var(--ketchup);}
.don-amount{font-family:'Jua',sans-serif;font-size:0.85rem;color:var(--yolk2);margin-bottom:4px;}
.don-msg{font-size:0.8rem;color:var(--text);}
.don-order{margin-top:8px;padding:6px 10px;background:rgba(245,200,66,0.15);border:1px solid var(--yolk);border-radius:8px;font-size:0.72rem;color:var(--text2);}

/* ═══ 치지직 모달 ═══ */
#chzzkModal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:300;align-items:center;justify-content:center;
}
#chzzkModal.show{display:flex;}
.chzzk-box{
  background:#fff;border-radius:20px;padding:24px;
  max-width:400px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.chzzk-title{font-family:'Jua',sans-serif;font-size:1.1rem;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.chzzk-badge{background:var(--ketchup);color:#fff;border-radius:6px;padding:2px 8px;font-size:0.7rem;}
.chzzk-status{min-height:32px;padding:6px 10px;border-radius:8px;font-size:0.75rem;margin-bottom:10px;font-family:'Nanum Gothic',sans-serif;}
.chzzk-status.err{background:#fff0f0;border:1px solid #ffaaaa;color:var(--ketchup);}
.chzzk-status.ok{background:#f0fff4;border:1px solid #aaffcc;color:var(--green);}
.chzzk-status.loading{background:#fffbf0;border:1px solid var(--yolk);color:var(--yolk2);}
.chzzk-label{font-size:0.72rem;color:var(--text2);margin-bottom:4px;font-weight:700;}
.chzzk-input{
  width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:8px;
  font-size:0.82rem;font-family:'Nanum Gothic',sans-serif;outline:none;
  margin-bottom:10px;
}
.chzzk-input:focus{border-color:var(--yolk);}
.chzzk-btn{
  width:100%;padding:12px;border:none;border-radius:10px;
  font-family:'Jua',sans-serif;font-size:0.95rem;cursor:pointer;
  background:linear-gradient(to right,var(--ketchup),var(--ketchup2));
  color:#fff;letter-spacing:1px;margin-bottom:8px;
  box-shadow:0 3px 0 #900;transition:all 0.1s;
}
.chzzk-btn:hover{transform:translateY(-1px);}
.chzzk-dis-btn{
  width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;
  background:#fff;color:var(--text2);font-family:'Jua',sans-serif;font-size:0.8rem;cursor:pointer;
}
.chzzk-close{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text2);}

/* 현재 연동 상태 표시 */
.conn-status-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:#f8f8f8;border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;margin-bottom:10px;font-size:0.72rem;
}

/* ═══ 일시정지 오버레이 ═══ */
#pauseOverlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:50;align-items:center;justify-content:center;
}
#pauseOverlay.show{display:flex;}
.pause-sign{
  background:#fff;border-radius:20px;padding:30px 50px;text-align:center;
  font-family:'Jua',sans-serif;font-size:1.5rem;color:var(--text);
}
.pause-sign small{display:block;font-size:0.8rem;color:var(--text2);margin-top:6px;}

/* ═══ 스페셜 이벤트 팝업 ═══ */
#specialPopup{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  z-index:250;align-items:center;justify-content:center;
}
#specialPopup.show{display:flex;}
.special-box{
  background:linear-gradient(135deg,#fff9ec,#fff0d0);
  border:3px solid var(--yolk2);border-radius:24px;
  padding:36px 48px;text-align:center;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.special-star{
  font-size:3rem;margin-bottom:8px;
  animation:spin 2s linear infinite;display:inline-block;
}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.special-title{

/* 레시피 목록

/* 게임 상태 */
const G = {
  selectedIngs: [],  // 선택된 재료 ID 배열
  score:        0,
  success:      0,
  fail:         0,
  paused:       false,
  cooking:      false,
  orders:       [],  // 후원/채팅 주문 목록
  activeRecipe: null,// 현재 선택된 레시피
};

/* ═══════════════════════════════════════════════════════
   초기화
═══════════════════════════════════════════════════════ */
function init(){
  renderIngredients();
  renderRecipes();
  renderScoreBoard();
  setupCanvas();
  setupKeyboard();
  checkOAuthRedirect();
}

/* 재료 버튼 렌더링 */
function renderIngredients(){
  const grid = document.getElementById('ingGrid');
  grid.innerHTML = INGREDIENTS.map(ing => `
    <button class="ing-btn ${G.selectedIngs.includes(ing.id)?'selected':''}"
      onclick="toggleIng('${ing.id}')">
      <span class="ing-emoji">${ing.emoji}</span>
      <span class="ing-name">${ing.name}</span>
    </button>
  `).join('');
}

/* 재료 선택/해제 */
function toggleIng(id){
  if(G.cooking) return;
  const idx = G.selectedIngs.indexOf(id);
  if(idx >= 0) G.selectedIngs.splice(idx,1);
  else G.selectedIngs.push(id);
  renderIngredients();
  renderSelTags();
  updatePan();
  updateRecipeHint();
}

/* 선택 태그 렌더링 */
function renderSelTags(){
  const area = document.getElementById('selTags');
  if(!G.selectedIngs.length){
    area.innerHTML = '<span class="sa-empty">재료를 선택하세요</span>';
    return;
  }
  area.innerHTML = G.selectedIngs.map(id => {
    const ing = INGREDIENTS.find(i=>i.id===id);
    return `<span class="sa-tag" onclick="toggleIng('${id}')">${ing.emoji} ${ing.name} ✕</span>`;
  }).join('');
}

/* 재료 초기화 */
function clearIngredients(){
  if(G.cooking) return;
  G.selectedIngs = [];
  renderIngredients();
  renderSelTags();
  updatePan();
  updateRecipeHint();
}

/* ═══════════════════════════════════════════════════════
   프라이팬 UI
═══════════════════════════════════════════════════════ */
function updatePan(){
  const pan = document.getElementById('panIngredients');
  pan.innerHTML = G.selectedIngs.map(id => {
    const ing = INGREDIENTS.find(i=>i.id===id);
    return `<span class="pan-item">${ing.emoji}</span>`;
  }).join('');
  /* 선택된 재료가 있으면 증기 표시 */
  document.getElementById('steam').classList.toggle('show', G.selectedIngs.length > 0);
}

/* 레시피 힌트 업데이트 */
function updateRecipeHint(){
  const hint = document.getElementById('recipeHint');
  if(!G.selectedIngs.length){ hint.textContent=''; return; }

  /* 현재 선택 재료로 만들 수 있는 레시피 찾기 */
  const sorted = [...G.selectedIngs].sort().join(',');
  const exact = RECIPES.find(r => [...r.req].sort().join(',') === sorted);
  if(exact){
    hint.innerHTML = `✅ <strong>${exact.name}</strong> 완성 가능! (+${exact.score}점)`;
    hint.style.color = '#2d9c4a';
    return;
  }

  /* 부분 일치 — 어떤 레시피에 가까운지 */
  let best = null, bestMatch = 0;
  for(const r of RECIPES){
    const match = G.selectedIngs.filter(i => r.req.includes(i)).length;
    if(match > bestMatch){ bestMatch=match; best=r; }
  }
  if(best && bestMatch > 0){
    const missing = best.req.filter(i => !G.selectedIngs.includes(i));
    const extra = G.selectedIngs.filter(i => !best.req.includes(i));
    let msg = `🔍 <strong>${best.name}</strong> 진행 중`;
    if(missing.length) msg += ` | 필요: ${missing.map(i=>INGREDIENTS.find(x=>x.id===i)?.emoji||'').join('')}`;
    if(extra.length) msg += ` | 잘못된 재료 있음⚠️`;
    hint.innerHTML = msg;
    hint.style.color = extra.length ? '#e8281e' : '#e8a820';
  } else {
    hint.innerHTML = '❓ 알 수 없는 조합';
    hint.style.color = '#888';
  }
}

/* ═══════════════════════════════════════════════════════
   요리 시작 — 레시피 매칭 후 성공/실패 판정
═══════════════════════════════════════════════════════ */
function startCooking(){
  if(G.cooking || G.paused) return;
  if(!G.selectedIngs.length){ showMsg('재료를 먼저 선택해주세요!'); return; }

  G.cooking = true;
  document.getElementById('cookBtn').disabled = true;

  /* 프라이팬 볶기 애니메이션 — 진행 바 표시 */
  const prog = document.getElementById('cookProgress');
  const bar  = document.getElementById('cookProgressBar');
  prog.style.display = 'block';

  /* 2.5초 동안 볶기 */
  let pct = 0;
  const tid = setInterval(()=>{
    pct += 2;
    bar.style.width = pct + '%';
    if(pct >= 100){
      clearInterval(tid);
      finishCooking();
    }
  }, 50);

  /* 볶기 중 팬 흔들기 */
  const pan = document.getElementById('fryPan');
  pan.style.animation = 'none';
  pan.style.transition = 'transform 0.1s';
  let shakeCount = 0;
  const shake = setInterval(()=>{
    const r = (Math.random()-0.5)*6;
    const y = (Math.random()-0.5)*4;
    pan.style.transform = `translateX(calc(-50% + ${r}px)) translateY(${y}px)`;
    shakeCount++;
    if(shakeCount > 40){
      clearInterval(shake);
      pan.style.transform = 'translateX(-50%)';
    }
  },60);
}

/* 요리 완료 — 레시피 판정 */
function finishCooking(){
  const prog = document.getElementById('cookProgress');
  const bar  = document.getElementById('cookProgressBar');
  prog.style.display = 'none';
  bar.style.width = '0%';
  document.getElementById('cookBtn').disabled = false;
  G.cooking = false;

  /* 정확 일치 레시피 검색 */
  const sorted = [...G.selectedIngs].sort().join(',');
  const matched = RECIPES.find(r => [...r.req].sort().join(',') === sorted);

  if(matched){
    /* 성공! */
    G.score += matched.score;
    G.success++;
    document.getElementById('scoreVal').textContent = G.score;
    renderScoreBoard();
    /* 스페셜 이벤트 진행 중이면 스페셜 결과 팝업 표시 */
    if(currentSpecialEvent){
      showSpecialResult(currentSpecialEvent);
    } else {
      showResult(true, matched);
    }
  } else {
    /* 실패 */
    G.fail++;
    renderScoreBoard();
    showResult(false, null);
  }
}

/* ═══════════════════════════════════════════════════════
   결과 팝업 — 완성 오므라이스 이미지 + 케챱 드로잉
═══════════════════════════════════════════════════════ */
function showResult(success, recipe){
  if(success){
    /* 성공 — 오므라이스 캔버스 팝업 표시 */
    const title = document.getElementById('resultTitle');
    const sub   = document.getElementById('resultSubtitle');
    title.textContent = `🎉 ${recipe.name} 완성!`;
    sub.textContent   = `${recipe.desc} (+${recipe.score}점)`;
    drawOmurice(recipe);
    document.getElementById('resultPopup').classList.add('show');
  } else {
    /* 실패 — 별도 실패 팝업 표시 */
    document.getElementById('failPopup').classList.add('show');
  }
}

function closeResult(){
  document.getElementById('resultPopup').classList.remove('show');
  clearIngredients();

/* ═══════════════════════════════════════════════════════
   캔버스 — 오므라이스 그림 + 케챱 드로잉
═══════════════════════════════════════════════════════ */
let drawCtx, isDrawing=false, drawColor='#e8281e', drawSize=4;

function setupCanvas(){
  const canvas = document.getElementById('omuCanvas');
  drawCtx = canvas.getContext('2d');
  window._omuCanvas = canvas; // 전역 참조 저장 — drawLine 등에서 사용

  /* 드로잉 이벤트 — 케챱으로 그리기 기능 */
  canvas.addEventListener('mousedown', e=>{isDrawing=true; drawDot(e);});
  canvas.addEventListener('mousemove', e=>{if(isDrawing) drawLine(e);});
  canvas.addEventListener('mouseup',   ()=>isDrawing=false);
  canvas.addEventListener('mouseleave',()=>isDrawing=false);
  /* 터치 지원 */
  canvas.addEventListener('touchstart', e=>{isDrawing=true; drawDot(e.touches[0]); e.preventDefault();},{passive:false});
  canvas.addEventListener('touchmove',  e=>{if(isDrawing) drawLine(e.touches[0]); e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',   ()=>isDrawing=false);
}

function getPos(e){
  const r = document.getElementById('omuCanvas').getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function drawDot(e){
  const {x,y} = getPos(e);
  drawCtx.beginPath();
  drawCtx.arc(x,y,drawSize/2,0,Math.PI*2);
  drawCtx.fillStyle = drawColor;
  drawCtx.fill();
}

function drawLine(e){
  const {x,y} = getPos(e);
  drawCtx.beginPath();
  drawCtx.lineWidth = drawSize;
  drawCtx.lineCap   = 'round';
  drawCtx.lineJoin  = 'round';
  drawCtx.strokeStyle = drawColor;
  if(drawCtx._lastX !== undefined){
    drawCtx.moveTo(drawCtx._lastX, drawCtx._lastY);
    drawCtx.lineTo(x,y);
    drawCtx.stroke();
  }
  drawCtx._lastX=x; drawCtx._lastY=y;
  document.getElementById('omuCanvas').addEventListener('mouseup',()=>{drawCtx._lastX=undefined;},{once:true});
}

function setColor(btn){
  document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  drawColor = btn.dataset.color;
}

function setSize(btn){
  document.querySelectorAll('.size-btn[data-size]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  drawSize = parseInt(btn.dataset.size);
}

function clearCanvas(){
  /* 케챱 드로잉만 지우고 오므라이스 기본 그림은 유지 */
  const recipe = window._currentRecipe || RECIPES[0];
  drawOmurice(recipe||RECIPES[0]);
}

/* 오므라이스 CSS Canvas 그림 그리기 */
function drawOmurice(recipe){
  const cv  = document.getElementById('omuCanvas');
  const ctx = drawCtx;
  ctx.clearRect(0,0,cv.width,cv.height);

  /* 배경 그라디언트 — 미리보기와 동일 */
  const bg = ctx.createLinearGradient(0,0,0,cv.height);
  bg.addColorStop(0,'#fff9f0'); bg.addColorStop(1,'#fdf0d8');
  ctx.fillStyle=bg; ctx.fillRect(0,0,cv.width,cv.height);

  /* 접시 그림자 */
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.12)'; ctx.shadowBlur=24; ctx.shadowOffsetY=8;
  ctx.beginPath(); ctx.ellipse(190,185,165,88,0,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();
  ctx.restore();

  /* 접시 테두리 */
  ctx.beginPath(); ctx.ellipse(190,185,165,88,0,0,Math.PI*2);
  ctx.strokeStyle='#e8d5b0'; ctx.lineWidth=3; ctx.stroke();

  /* 접시 내부 링 */
  ctx.beginPath(); ctx.ellipse(190,182,144,74,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(232,213,176,0.4)'; ctx.lineWidth=1.5; ctx.stroke();

  /* 오므라이스 몸통 — 미리보기와 동일한 그라디언트 */
  ctx.save();
  ctx.shadowColor='rgba(180,120,0,0.18)'; ctx.shadowBlur=12; ctx.shadowOffsetY=4;
  ctx.beginPath(); ctx.ellipse(190,166,128,62,0,0,Math.PI*2);
  const egg = ctx.createRadialGradient(172,150,4,190,166,128);
  egg.addColorStop(0,'#fffce0');
  egg.addColorStop(0.45,'#f7e840');
  egg.addColorStop(0.8,'#f0c820');
  egg.addColorStop(1,'#e0a010');
  ctx.fillStyle=egg; ctx.fill();
  ctx.restore();

  /* 계란 외곽선 */
  ctx.beginPath(); ctx.ellipse(190,166,128,62,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,150,0,0.2)'; ctx.lineWidth=1.5; ctx.stroke();

  /* 하이라이트 */
  ctx.save();
  ctx.globalAlpha=0.38;
  ctx.beginPath(); ctx.ellipse(152,148,42,18,Math.PI*-0.22,0,Math.PI*2);
  const hl = ctx.createRadialGradient(152,148,2,152,148,42);
  hl.addColorStop(0,'#ffffff'); hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl; ctx.fill();
  ctx.restore();

  /* 케챱은 사용자가 직접 그리는 영역 — 기본 이미지에는 표시 안 함 */

  /* 레시피별 토핑 이모지 */
  if(recipe){
    const extras = recipe.req.filter(i=>!['egg','rice','ketchup','butter'].includes(i));
    if(extras.length){
      ctx.font='20px serif'; ctx.textAlign='center';
      const startX = 190 - (extras.length-1)*26;
      extras.slice(0,4).forEach((id,i)=>{
        const ing = INGREDIENTS.find(x=>x.id===id);
        ctx.fillText(ing?.emoji||'', startX+i*52, 210);
      });
    }
  }

  /* 점수 뱃지 */
  ctx.save();
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(264,16,106,36,9);
  else ctx.rect(264,16,106,36);
  ctx.fillStyle='#e8281e'; ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 14px Nanum Gothic, sans-serif'; ctx.textAlign='center';
  ctx.fillText(`+${recipe?.score||0}점 🎉`, 317, 40);
  ctx.restore();

  /* 레시피 이름 */
  ctx.font='bold 15px Nanum Gothic';
  ctx.fillStyle='#5a3a10';
  ctx.textAlign='center';
  ctx.fillText(recipe?.name||'오므라이스', 190, 250);

  /* 현재 레시피 ID 저장 (케챱 지우기 시 재사용) */
  window._currentRecipe = recipe; // 케챱 지우기 시 재사용
}

/* ═══════════════════════════════════════════════════════
   후원/채팅 주문 처리
   - 2000원 이상 후원 → 주문 팝업 + 주문 목록 추가
   - chatOrderUser가 !주문 채팅 → 주문 처리
═══════════════════════════════════════════════════════ */
function receiveDonation({nickname, message, amount, isChatOrder=false}){
  /* 2000원 미만 후원은 무시 (채팅 주문은 예외) — 기존 로직 유지 */
  if(amount < 2000 && !isChatOrder) return;

  /* 후원 팝업 표시 */
  showDonPopup(nickname, amount, message, isChatOrder);

  /* 주문 목록에 추가 */
  addOrder(nickname, amount, message, isChatOrder);

  /* ── 스페셜 이벤트 판정 ── */
  const rand = Math.random();

  if(isChatOrder){
    /* 냐피카 !주문: 5% 확률로 두 이벤트 중 랜덤 */
    if(rand < 0.05){
      const pick = Math.random() < 0.5 ? 'aegyo' : 'nyang';
      setTimeout(()=>showSpecialPopup(pick), 800);
    }
  } else {
    /* 5000원 이상 후원: 20% 확률 → 애교 오므라이스 이벤트 */
    if(amount >= 5000 && rand < 0.20){
      setTimeout(()=>showSpecialPopup('aegyo'), 800);
    }
    /* 정확히 3000원 후원: 10% 확률 → 냥체 이벤트
       (4000원처럼 3000원 초과 5000원 미만은 일반 주문으로만 처리) */
    else if(amount === 3000 && rand < 0.10){
      setTimeout(()=>showSpecialPopup('nyang'), 800);
    }
  }
}

function showDonPopup(nick, amount, msg, isChatOrder){
  document.getElementById('donNick').textContent    = nick;
  document.getElementById('donAmount').textContent  = isChatOrder ? '채팅 주문' : `${amount.toLocaleString()}원 후원!`;
  document.getElementById('donMsg').textContent     = msg || '';
  const order = document.getElementById('donOrder');
  order.style.display = 'block';
  order.textContent   = '🍳 오므라이스 주문이 들어왔어요!';

  const popup = document.getElementById('donationPopup');
  popup.style.display = 'block';
  popup.style.animation = 'none';
  popup.offsetHeight; // reflow
  popup.style.animation = 'slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';

  setTimeout(()=>{ popup.style.display='none'; }, 6000);
}

/* ═══════════════════════════════════════════════════════
   치지직 OAuth & 연동 로직
   이하 코드는 기존 메이드카페 게임에서 이식
   CORS 우회를 위해 Cloudflare Worker (PROXY_URL) 경유
═══════════════════════════════════════════════════════ */
function showChzzkSetup(){
  document.getElementById('chzzkModal').classList.add('show');
  updateConnStatus();

}

}

function updateConnStatus(){
  const txt = document.getElementById('connStatusText');
  const btn = document.getElementById('connDisconnectBtn');
  if(CHZZK.accessToken){
    txt.innerHTML = '🟢 연동됨';
    btn.style.display = 'inline-block';
  } else {
    txt.innerHTML = '⚫ 연동 안됨';
    btn.style.display = 'none';
  }
}

function setChzzkStatus(type, msg){
  const el = document.getElementById('chzzkStatus');
  el.className = 'chzzk-status' + (type?' '+type:'');
  el.innerHTML = msg;
}

function disconnectChzzk(){
  if(!confirm('치지직 연동을 해제할까요?')) return;
  if(CHZZK.socket){ try{CHZZK.socket.disconnect();}catch(e){} CHZZK.socket=null; }
  CHZZK.accessToken=''; CHZZK.sessionKey=''; CHZZK.socketUrl='';
  document.getElementById('chzzkDot').classList.remove('live');
  document.getElementById('hudChzzkBtn').style.display='flex';
  document.getElementById('chzzkLiveBadge').style.display='none';
  document.getElementById('chzzkConnLabel').textContent='치지직 연동';
  updateConnStatus();
  closeChzzkModal();
  showMsg('🔌 치지직 연동 해제됨');
}

function startOAuthFromModal(){
  const uid = document.getElementById('chzzkChannelId').value.trim();
  if(!uid){ setChzzkStatus('err','⚠ 채널 UID를 입력하세요'); return; }
  CHZZK.channelId = uid;
  startOAuth();
}

function startOAuth(){
  if(location.protocol==='file:'){
    setChzzkStatus('err','⚠ 로컬 파일은 OAuth 불가. GitHub Pages로 배포 후 사용하세요.');
    return;
  }
  const cid      = CHZZK.clientId;
  const redirect = location.href.split('?')[0];
  const state    = 'omu_' + Math.random().toString(36).slice(2,8);
  sessionStorage.setItem('chzzk_oauth_state', state);
  sessionStorage.setItem('chzzk_pending', JSON.stringify({channelId:CHZZK.channelId}));

  const oauthUrl = 'https://chzzk.naver.com/account-interlock'
    + '?clientId='    + encodeURIComponent(cid)
    + '&redirectUri=' + encodeURIComponent(redirect)
    + '&state='       + encodeURIComponent(state);

  location.href = oauthUrl;
}

async function exchangeCode(code){
  setChzzkStatus('loading','🔄 토큰 교환 중...');
  try{
    const state = sessionStorage.getItem('chzzk_oauth_state')||'';
    const resp  = await fetch(`${PROXY_URL}/token`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code, state, redirectUri:location.href.split('?')[0]})
    });
    const data = await resp.json();
    if(data?.content?.accessToken){
      CHZZK.accessToken = data.content.accessToken;
      setChzzkStatus('loading','🔄 세션 연결 중...');
      await connectChzzk();
    } else {
      throw new Error(data?.message||'토큰 교환 실패');
    }
  }catch(e){
    setChzzkStatus('err','⚠ '+e.message);
  }
}

async function connectChzzk(){
  if(!CHZZK.accessToken){
    const tok = document.getElementById('chzzkAccessTokenManual')?.value.trim();
    if(!tok){ setChzzkStatus('err','⚠ 먼저 로그인하세요.'); return; }
    CHZZK.accessToken = tok.replace(/^Bearer\s+/i,'');
  }
  setChzzkStatus('loading','🔄 소켓 URL 발급 중...');
  let sessionUrl;
  try{
    const r = await fetch(`${PROXY_URL}/session`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({accessToken:CHZZK.accessToken})
    });
    const d = await r.json();
    if(d.code && d.code!==200) throw new Error(`세션 오류(${d.code}): ${d.message||''}`);
    sessionUrl = d?.content?.url || d?.url;
    if(!sessionUrl) throw new Error('소켓 URL 없음');
    setChzzkStatus('loading','✅ 소켓 연결 중...');
  }catch(e){
    setChzzkStatus('err','⚠ 세션: '+e.message); return;
  }

  try{
    await chzzkSocketConnect(sessionUrl);
  }catch(e){
    setChzzkStatus('err','⚠ 소켓: '+e.message); return;
  }

  /* 후원 구독 */
  try{
    const sr = await fetch(`${PROXY_URL}/subscribe/donation`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sessionKey:CHZZK.sessionKey, accessToken:CHZZK.accessToken, channelId:CHZZK.channelId})
    });
    const sd = await sr.json();
    if(sd.code && sd.code!==200) throw new Error(`구독 오류(${sd.code}): ${sd.message||''}`);
  }catch(e){
    setChzzkStatus('err','⚠ 구독: '+e.message); return;
  }

  /* 채팅 구독 */
  try{
    await fetch(`${PROXY_URL}/subscribe/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sessionKey:CHZZK.sessionKey, accessToken:CHZZK.accessToken, channelId:CHZZK.channelId})
    });
  }catch(e){ /* 채팅 구독 실패는 무시 */ }

  /* 연동 완료 */
  document.getElementById('chzzkDot').classList.add('live');
  document.getElementById('hudChzzkBtn').style.display='none';
  document.getElementById('chzzkLiveBadge').style.display='flex';
  updateConnStatus();
  setChzzkStatus('ok','✅ 연동 완료! 후원을 기다리는 중...');
  showMsg('🎉 치지직 연동 성공!');

  /* _autoLaunch: OAuth 리다이렉트로 들어온 경우 모달 자동 닫기 */
  if(CHZZK._autoLaunch){
    CHZZK._autoLaunch = false;
    setTimeout(closeChzzkModal, 2000);
  }
}

/* socket.io를 치지직 연결 시점에 동적으로 로드
   — 페이지 로드 시 CDN 스크립트 오류(Script error)를 방지하기 위해 지연 로드 */
function loadSocketIO(){
  return new Promise((res,rej)=>{
    if(window.io){ res(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js';
    s.onload  = () => res();
    s.onerror = () => rej(new Error('socket.io 로드 실패'));
    document.head.appendChild(s);
  });
}

function chzzkSocketConnect(url){
  return new Promise(async (resolve,reject)=>{
    /* socket.io 동적 로드 */
    try{ await loadSocketIO(); }
    catch(e){ reject(e); return; }
    if(CHZZK.socket){ try{CHZZK.socket.disconnect();}catch(e){} }
    const sock = window.io(url,{reconnection:true,forceNew:true,timeout:5000,transports:['websocket']});
    CHZZK.socket = sock;
    const tid = setTimeout(()=>reject(new Error('연결 시간 초과(5s)')), 6000);

    sock.on('connect',()=>{
      /* connect만으로는 sessionKey 없음 — SYSTEM connected 대기 */
    });
    sock.on('connect_error', e=>{ clearTimeout(tid); reject(new Error(e.message||'연결 오류')); });

    sock.on('SYSTEM', data=>{
      try{
        const d = typeof data==='string'?JSON.parse(data):data;
        if(d.type==='connected'){
          clearTimeout(tid);
          CHZZK.sessionKey = d.data?.sessionKey || '';
          resolve(); /* sessionKey 받은 후 resolve — 이후 구독 API 호출 가능 */
        }
      }catch(e){ clearTimeout(tid); reject(e); }
    });

    /* 후원 이벤트 수신 */
    sock.on('DONATION', data=>{
      try{
        const d = typeof data==='string'?JSON.parse(data):data;
        receiveDonation({
          nickname: d.donatorNickname||'익명',
          message:  d.donationText||'',
          amount:   Number(d.payAmount)||0,
        });
      }catch(e){}
    });

    /* 채팅 이벤트 — !주문 감지 */
    sock.on('CHAT', data=>{
      try{
        const d    = typeof data==='string'?JSON.parse(data):data;
        const nick = d.profile?.nickname||'';
        const msg  = d.content||'';
        if(nick===CHZZK.chatOrderUser && msg.includes('!주문')){
          receiveDonation({
            nickname:    nick,
            message:     msg.replace('!주문','').trim()||'채팅 주문!',
            amount:      2000,
            isChatOrder: true,
          });
        }
      }catch(e){}
    });
  });
}

/* 페이지 로드 시 OAuth 리다이렉트 code 처리 */
(function checkOAuthRedirect(){
  const params = new URLSearchParams(location.search);
  const code   = params.get('code')||params.get('chzzk_code');
  if(!code) return;

  history.replaceState({},'',location.pathname);
  const saved = sessionStorage.getItem('chzzk_pending');
  if(saved){ try{ const d=JSON.parse(saved); if(d.channelId) CHZZK.channelId=d.channelId; }catch(e){} }

  document.getElementById('chzzkModal').classList.add('show');
  setChzzkStatus('loading','🔄 로그인 완료! 토큰 교환 중...');
  CHZZK._autoLaunch = true;
  exchangeCode(code);
})();

/* ═══ 시작 ═══ */
init();
</script>
